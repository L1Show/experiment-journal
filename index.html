<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验记录本</title>
<style>
:root {
  --bg: #f7f7f5; --surface: #ffffff; --border: #e8e8e4;
  --text: #1a1a1a; --text-secondary: #6b6b6b; --text-muted: #9b9b9b;
  --accent: #2b6cb0; --accent-light: #ebf4ff; --accent-hover: #1a5490;
  --danger: #e53e3e; --danger-light: #fff5f5;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
  --sidebar-w: 320px; --topbar-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
}
.topbar {
  height: var(--topbar-h); background: var(--surface);
  border-bottom: 1px solid var(--border); display: flex; align-items: center;
  padding: 0 20px; gap: 16px; z-index: 100; flex-shrink: 0;
}
.topbar .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.topbar .logo svg { width: 22px; height: 22px; color: var(--accent); }
.search-wrap { flex: 1; max-width: 360px; position: relative; }
.search-wrap input {
  width: 100%; height: 36px; padding: 0 12px 0 36px; border: 1px solid var(--border);
  border-radius: 20px; font-size: 14px; outline: none; background: var(--bg); transition: all .2s;
}
.search-wrap input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); }
.btn-new {
  height: 36px; padding: 0 16px; background: var(--accent); color: #fff; border: none;
  border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-new:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-new svg { width: 16px; height: 16px; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-header .count { font-size: 13px; color: var(--text-muted); }
.tag-filter { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.tag-filter::-webkit-scrollbar { height: 0; }
.tag-chip {
  padding: 4px 12px; border-radius: 14px; font-size: 12px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer; white-space: nowrap; transition: all .15s; user-select: none;
}
.tag-chip:hover { background: var(--accent-light); border-color: var(--accent); }
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.exp-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.exp-list::-webkit-scrollbar { width: 4px; }
.exp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.exp-card {
  padding: 14px; margin-bottom: 6px; border-radius: var(--radius); cursor: pointer;
  transition: all .15s; border: 1px solid transparent;
}
.exp-card:hover { background: #fafaf9; }
.exp-card.selected { background: var(--accent-light); border-color: var(--accent); }
.exp-card .card-title {
  font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.exp-card .card-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.exp-card .card-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  background: #f0f0ed; color: var(--text-secondary); margin-top: 6px;
}
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content-wrap { flex: 1; overflow-y: auto; padding: 24px 32px; }
.content-wrap::-webkit-scrollbar { width: 6px; }
.content-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); gap: 12px;
}
.empty-state svg { width: 64px; height: 64px; opacity: .3; }
.empty-state p { font-size: 15px; }
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-secondary); margin-bottom: 6px;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-family: inherit; outline: none; background: var(--bg);
  transition: all .15s; resize: vertical; line-height: 1.6;
}
.form-group input:focus, .form-group textarea:focus {
  border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-actions { display: flex; gap: 10px; padding-top: 8px; }
.btn {
  height: 38px; padding: 0 20px; border-radius: var(--radius-sm); font-size: 14px;
  font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface);
  transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: #f5f5f3; }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: var(--danger); border-color: var(--danger); }
.btn.danger:hover { background: var(--danger-light); }
.btn svg { width: 16px; height: 16px; }
.attachments-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
.drop-zone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px;
  text-align: center; cursor: pointer; transition: all .2s; background: var(--bg);
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--accent-light); }
.drop-zone svg { width: 32px; height: 32px; color: var(--text-muted); margin-bottom: 8px; }
.drop-zone p { font-size: 13px; color: var(--text-secondary); }
.drop-zone span { color: var(--accent); font-weight: 500; }
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 14px; }
.file-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; display: flex; flex-direction: column; gap: 6px; transition: all .15s; cursor: pointer;
}
.file-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
.file-icon-wrap {
  width: 100%; height: 80px; border-radius: 4px; overflow: hidden;
  display: flex; align-items: center; justify-content: center; background: #e8e8e4; flex-shrink: 0;
}
.file-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.file-icon-wrap .file-type-icon { font-size: 32px; opacity: .4; }
.file-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 11px; color: var(--text-muted); }
.file-actions { display: flex; gap: 4px; margin-top: 2px; }
.file-actions button {
  flex: 1; height: 26px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--surface); cursor: pointer; transition: all .1s;
}
.file-actions button:hover { background: var(--accent-light); }
.file-actions button.del-btn:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 999;
  display: flex; align-items: center; justify-content: center; animation: fadeIn .15s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface); border-radius: var(--radius-lg); max-width: 90vw;
  max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); animation: slideUp .2s;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70vw; }
.modal-header button {
  width: 32px; height: 32px; border: none; background: none; cursor: pointer;
  border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.modal-header button:hover { background: var(--bg); }
.modal-body { flex: 1; overflow: auto; padding: 20px; display: flex; align-items: center; justify-content: center; }
.modal-body img { max-width: 100%; max-height: 70vh; border-radius: var(--radius-sm); }
.modal-body pre {
  width: 100%; max-height: 70vh; overflow: auto; background: #1e1e1e; color: #d4d4d4;
  padding: 20px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-all;
}
.modal-body video, .modal-body audio { max-width: 100%; max-height: 70vh; }
.modal-body iframe { width: 100%; height: 80vh; border: none; }
.modal-body .file-info { text-align: center; color: var(--text-secondary); }
.modal-body .file-info svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 12px; }
.modal-body .file-info .download-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 24px;
  background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
  font-size: 14px; cursor: pointer; text-decoration: none;
}
.setup-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.setup-box {
  background: var(--surface); padding: 40px; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); max-width: 440px; width: 90%; text-align: center;
}
.setup-box h2 { font-size: 20px; margin-bottom: 8px; }
.setup-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
.setup-box input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; outline: none; font-family: monospace; margin-bottom: 16px;
}
.setup-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.setup-box .hint { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; text-align: left; }
.setup-box .hint a { color: var(--accent); }
.status-bar {
  position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 16px; font-size: 12px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px; z-index: 200; box-shadow: var(--shadow-sm);
  transition: opacity .3s; pointer-events: none;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-dot.synced { background: #48bb78; }
.status-dot.syncing { background: #ecc94b; animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.settings-btn {
  position: fixed; bottom: 16px; right: 16px; width: 36px; height: 36px;
  border-radius: 50%; border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: .5; transition: opacity .2s; box-shadow: var(--shadow-sm);
}
.settings-btn:hover { opacity: 1; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -100%; transition: left .3s; z-index: 10; height: 100%; width: 100%; }
  .sidebar.open { left: 0; }
  .content-wrap { padding: 16px; }
}
</style>
</head>
<body>

<div class="status-bar" id="statusBar" style="opacity:0;">
  <span class="status-dot synced" id="statusDot"></span>
  <span id="statusText">已同步</span>
</div>

<header class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    实验记录本
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="搜索实验…">
  </div>
  <button class="btn-new" onclick="createNew()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    新建实验
  </button>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight:600;font-size:14px;">实验列表</span>
      <span class="count" id="expCount">加载中…</span>
    </div>
    <div class="tag-filter" id="tagFilter"></div>
    <div class="exp-list" id="expList"></div>
  </aside>
  <main class="content">
    <div class="content-wrap" id="contentWrap">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        <p>选择左侧实验或点击「新建实验」开始记录</p>
      </div>
      <div id="detailPanel" style="display:none;"></div>
    </div>
  </main>
</div>

<div id="previewModal" class="modal-overlay" style="display:none;" onclick="closeModal(event)"></div>

<!-- Token Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>🔐 首次设置</h2>
    <p>输入 GitHub Token 以启用云端同步。<br>手机和电脑输入同一个 Token，数据即可互通。</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="hint">
      没有 Token？<a href="https://github.com/settings/tokens/new" target="_blank">点此创建</a><br>
      勾选 <b>repo</b> 权限，生成后粘贴到上方
    </div>
    <button class="btn primary" onclick="saveSetup()" style="width:100%;justify-content:center;">保存并开始使用</button>
  </div>
</div>

<button class="settings-btn" onclick="showSettings()" title="设置">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<script>
/* ===== GitHub Sync Engine ===== */
const REPO = 'L1Show/experiment-journal';
const BRANCH = 'main';
const DATA_FILE = 'data/experiments.json';

function getToken() { return localStorage.getItem('gh_token') || ''; }
function setToken(t) { localStorage.setItem('gh_token', t); }

function toBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function fromBase64(b64) {
  return decodeURIComponent(escape(atob(b64)));
}

// Read data (no auth needed via raw.githubusercontent.com)
async function fetchData() {
  const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DATA_FILE}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (res.status === 404) return { experiments: [], attachments: [], next_exp_id: 1, next_att_id: 1 };
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// Get file info + SHA from GitHub API (for updates)
async function getFileInfo(path) {
  const token = getToken();
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(path)}`, {
    headers: { Authorization: `token ${token}`, 'Cache-Control': 'no-cache' }
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const j = await res.json();
  if (Array.isArray(j)) return j[0]; // path is a directory? Try first item
  return j;
}

// Save JSON data to GitHub
async function saveData(data, message) {
  const token = getToken();
  if (!token) throw new Error('未配置 Token');

  const content = JSON.stringify(data, null, 2);
  const encoded = toBase64(content);

  let sha = null;
  try {
    const info = await getFileInfo(DATA_FILE);
    if (info) sha = info.sha;
  } catch(e) { /* file doesn't exist yet */ }

  const body = { message: message || 'Update data', content: encoded, branch: BRANCH };
  if (sha) body.sha = sha;

  // Use encodeURIComponent for the path but NOT for the entire URL
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (err.message && err.message.includes('sha')) throw new Error('CONFLICT');
    throw new Error(`保存失败: ${err.message || res.status}`);
  }
  return await res.json();
}

// Upload binary file to GitHub
async function uploadGitHubFile(path, blob, message) {
  const token = getToken();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1]; // Remove data:... prefix
      const body = { message, content: base64, branch: BRANCH };

      let sha = null;
      try {
        const info = await getFileInfo(path);
        if (info) sha = info.sha;
      } catch(e) {}

      if (sha) body.sha = sha;

      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(path)}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        reject(new Error(err.message || `Upload failed: ${res.status}`));
      } else {
        resolve(await res.json());
      }
    };
    reader.onerror = () => reject(new Error('读取文件失败'));
    reader.readAsDataURL(blob);
  });
}

// Delete file from GitHub
async function deleteGitHubFile(path, message) {
  const token = getToken();
  const info = await getFileInfo(path);
  if (!info) return; // Already deleted

  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(path)}`, {
    method: 'DELETE',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha: info.sha, branch: BRANCH })
  });

  if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
}

function fileUrl(path) {
  return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
}

/* ===== State ===== */
let data = { experiments: [], attachments: [], next_exp_id: 1, next_att_id: 1 };
let selectedId = null;
let currentFilter = '全部';
let _renderingId = 0;
let _syncTimer = null;

/* ===== UI Helpers ===== */
function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(text, syncing) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  bar.style.opacity = '1';
  dot.className = 'status-dot ' + (syncing ? 'syncing' : 'synced');
  txt.textContent = text;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => { bar.style.opacity = '0'; }, 3000);
}

async function loadData() {
  setStatus('同步中…', true);
  try {
    data = await fetchData();
    setStatus('已同步', false);
    renderAll();
  } catch(err) {
    console.error('加载失败:', err);
    setStatus('⚠ 加载失败，请检查网络', false);
    document.getElementById('expList').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--danger);">⚠️ 数据加载失败。<br><small>请检查网络连接或 Token 是否正确</small></div>';
  }
}

async function saveAllData(msg) {
  setStatus('保存中…', true);
  try {
    await saveData(data, msg);
    setStatus('已同步', false);
  } catch(err) {
    if (err.message === 'CONFLICT') {
      // Conflict - reload and retry
      setStatus('冲突，重新同步…', true);
      const fresh = await fetchData();
      // Merge: keep our new/changed experiments, use fresh for unchanged ones
      const freshIds = new Set(fresh.experiments.map(e => e.id));
      const ourNew = data.experiments.filter(e => !freshIds.has(e.id));
      // For existing experiments, use our version (more recent edits)
      const merged = fresh.experiments.map(e => {
        const ours = data.experiments.find(o => o.id === e.id);
        return (ours && ours.updated_at >= e.updated_at) ? ours : e;
      });
      ourNew.forEach(e => merged.push(e));
      data.experiments = merged;
      data.attachments = [...fresh.attachments, ...data.attachments.filter(a => !fresh.attachments.some(fa => fa.id === a.id))];
      data.next_exp_id = Math.max(data.next_exp_id, fresh.next_exp_id);
      data.next_att_id = Math.max(data.next_att_id, fresh.next_att_id);
      try {
        await saveData(data, msg);
        setStatus('已同步', false);
      } catch(e2) {
        setStatus('⚠ 同步失败，请刷新', false);
        console.error(e2);
      }
    } else {
      setStatus('⚠ 保存失败: ' + err.message, false);
      console.error(err);
    }
  }
  renderAll();
}

/* ===== Render ===== */
function renderAll() {
  const experiments = data.experiments.sort((a, b) => b.updated_at - a.updated_at);
  renderSidebar(experiments);
  if (selectedId) {
    const exp = experiments.find(e => e.id === selectedId);
    if (exp) renderDetail(exp);
    else { selectedId = null; renderDetail(null); }
  }
}

function renderSidebar(experiments) {
  const list = document.getElementById('expList');
  const countEl = document.getElementById('expCount');
  const tagFilter = document.getElementById('tagFilter');

  const tags = new Set();
  experiments.forEach(e => { if (e.category) tags.add(e.category); });

  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = experiments;
  if (currentFilter !== '全部') filtered = filtered.filter(e => e.category === currentFilter);
  if (search) {
    filtered = filtered.filter(e =>
      (e.title || '').toLowerCase().includes(search) ||
      (e.category || '').toLowerCase().includes(search) ||
      (e.objective || '').toLowerCase().includes(search)
    );
  }

  const tagArr = ['全部', ...tags];
  tagFilter.innerHTML = tagArr.map(t =>
    `<span class="tag-chip${t === currentFilter ? ' active' : ''}" onclick="filterByTag('${t.replace(/'/g, "\\'")}')">${t}</span>`
  ).join('');
  countEl.textContent = `${experiments.length} 条记录`;

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">暂无实验记录</div>';
    return;
  }

  list.innerHTML = filtered.map(e => {
    const d = new Date(e.date || e.created_at);
    const dateStr = isNaN(d) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const attCount = data.attachments.filter(a => a.experiment_id === e.id).length;
    return `
      <div class="exp-card${e.id === selectedId ? ' selected' : ''}" onclick="selectExp(${e.id})">
        <div class="card-title">${esc(e.title || '未命名实验')}</div>
        <div class="card-meta">
          <span>${dateStr}</span>
          ${attCount ? `<span>📎${attCount}</span>` : ''}
        </div>
        ${e.category ? `<span class="card-tag">${esc(e.category)}</span>` : ''}
      </div>`;
  }).join('');
}

async function selectExp(id) {
  selectedId = id;
  const exp = data.experiments.find(e => e.id === id);
  const rid = ++_renderingId;
  if (exp) {
    renderDetail(exp);
    renderSidebar(data.experiments.sort((a, b) => b.updated_at - a.updated_at));
  } else {
    renderDetail(null);
  }
}

function renderDetail(exp) {
  const empty = document.getElementById('emptyState');
  const panel = document.getElementById('detailPanel');

  if (!exp) {
    empty.style.display = 'flex'; panel.style.display = 'none'; return;
  }

  empty.style.display = 'none'; panel.style.display = 'block';

  const attachments = data.attachments.filter(a => a.experiment_id === exp.id);
  const d = exp.date ? new Date(exp.date) : new Date(exp.created_at);
  const dateVal = isNaN(d) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2 style="font-size:22px;font-weight:700;">实验详情</h2>
      <div class="form-actions" style="padding:0;">
        <button class="btn primary" onclick="saveCurrent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存
        </button>
        <button class="btn danger" onclick="deleteCurrent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>实验标题</label>
        <input type="text" id="fTitle" value="${escAttr(exp.title || '')}" placeholder="例如：溶胶-凝胶法合成TiO₂纳米颗粒">
      </div>
      <div class="form-group">
        <label>实验日期</label>
        <input type="date" id="fDate" value="${dateVal}">
      </div>
    </div>
    <div class="form-group">
      <label>实验分类</label>
      <input type="text" id="fCategory" value="${escAttr(exp.category || '')}" placeholder="例如：合成、XRD表征、EIS测试、SEM…">
    </div>
    <div class="form-group">
      <label>实验目的</label>
      <textarea id="fObjective" rows="2" placeholder="描述本次实验的目标…">${esc(exp.objective || '')}</textarea>
    </div>
    <div class="form-group">
      <label>实验流程与条件</label>
      <textarea id="fProcess" rows="6" placeholder="记录实验步骤、反应条件（温度、时间、配比等）…">${esc(exp.process || '')}</textarea>
    </div>
    <div class="form-group">
      <label>实验结果与数据</label>
      <textarea id="fResults" rows="5" placeholder="记录实验结果、XRD图谱分析、EIS数据、SEM观察等…">${esc(exp.results || '')}</textarea>
    </div>
    <div class="form-group">
      <label>结论与备注</label>
      <textarea id="fConclusion" rows="3" placeholder="实验结论、改进方向、注意事项…">${esc(exp.conclusion || '')}</textarea>
    </div>

    <div class="attachments-section">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">📎 附件文件</h3>
      <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>拖拽文件到此处，或 <span>点击上传</span></p>
        <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFiles(this.files)">
      </div>
      <div class="file-grid" id="fileGrid">${renderFileCards(attachments)}</div>
    </div>
  `;

  // Bind events
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
}

function renderFileCards(attachments) {
  if (!attachments.length) return '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">暂无附件，拖拽文件到上方区域上传</div>';
  return attachments.map(a => {
    const isImage = a.type && a.type.startsWith('image/');
    const sizeStr = a.size > 1024*1024 ? `${(a.size/(1024*1024)).toFixed(1)} MB` : `${(a.size/1024).toFixed(0)} KB`;
    const url = a.path ? fileUrl(a.path) : '#';
    return `
      <div class="file-card" onclick="previewAtt(${a.id})">
        <div class="file-icon-wrap">
          ${isImage ? `<img src="${url}" alt="${esc(a.name)}" loading="lazy">` : `<span class="file-type-icon">${fileIcon(a.type)}</span>`}
        </div>
        <div class="file-name" title="${esc(a.name)}">${esc(a.name)}</div>
        <div class="file-size">${sizeStr}</div>
        <div class="file-actions" onclick="event.stopPropagation()">
          <button onclick="previewAtt(${a.id})">预览</button>
          <button onclick="downloadAtt(${a.id})">下载</button>
          <button class="del-btn" onclick="removeAttachment(${a.id})">删除</button>
        </div>
      </div>`;
  }).join('');
}

function fileIcon(type) {
  if (!type) return '📄';
  if (type.includes('pdf')) return '📑';
  if (type.includes('text') || type.includes('json') || type.includes('xml')) return '📝';
  if (type.includes('video')) return '🎬';
  if (type.includes('audio')) return '🎵';
  return '📄';
}

/* ===== Actions ===== */
async function createNew() {
  const id = data.next_exp_id++;
  const exp = {
    id, title: '', date: new Date().toISOString().split('T')[0],
    category: '', objective: '', process: '', results: '', conclusion: '',
    created_at: Date.now(), updated_at: Date.now()
  };
  data.experiments.push(exp);
  selectedId = id;
  await saveAllData('新建实验');
}

async function saveCurrent() {
  if (!selectedId) return;
  const exp = data.experiments.find(e => e.id === selectedId);
  if (!exp) return;

  exp.title = document.getElementById('fTitle').value.trim();
  exp.date = document.getElementById('fDate').value;
  exp.category = document.getElementById('fCategory').value.trim();
  exp.objective = document.getElementById('fObjective').value.trim();
  exp.process = document.getElementById('fProcess').value.trim();
  exp.results = document.getElementById('fResults').value.trim();
  exp.conclusion = document.getElementById('fConclusion').value.trim();
  exp.updated_at = Date.now();

  await saveAllData('更新实验');
  showToast('✅ 保存成功');
}

async function deleteCurrent() {
  if (!selectedId) return;
  if (!confirm('确定删除该实验及其所有附件吗？此操作不可撤销。')) return;

  try {
    // Delete attachment files from GitHub
    const atts = data.attachments.filter(a => a.experiment_id === selectedId);
    for (const a of atts) {
      try { await deleteGitHubFile(a.path, '删除附件'); } catch(e) { console.warn('删除文件失败:', a.path, e); }
    }

    // Remove from local data
    data.attachments = data.attachments.filter(a => a.experiment_id !== selectedId);
    data.experiments = data.experiments.filter(e => e.id !== selectedId);
    selectedId = null;

    await saveAllData('删除实验');
    renderDetail(null);
    showToast('✅ 已删除');
  } catch(err) {
    console.error('Delete error:', err);
    showToast('❌ 删除失败，请重试');
  }
}

async function handleFiles(files) {
  if (!selectedId) { showToast('请先选择或创建实验'); return; }
  if (!files.length) return;

  setStatus('上传中…', true);
  for (const file of files) {
    const attId = data.next_att_id++;
    const path = `data/files/${attId}_${file.name}`;
    try {
      await uploadGitHubFile(path, file, `上传附件: ${file.name}`);
      data.attachments.push({
        id: attId, experiment_id: selectedId,
        name: file.name, type: file.type, size: file.size,
        path: path, uploaded_at: Date.now()
      });
    } catch(err) {
      console.error('Upload error:', err);
      showToast('❌ 上传失败: ' + file.name);
    }
  }
  await saveAllData('上传附件');
  refreshAttachments();
  showToast(`✅ 已上传 ${files.length} 个文件`);
}

async function refreshAttachments() {
  if (!selectedId) return;
  const grid = document.getElementById('fileGrid');
  if (grid) {
    const atts = data.attachments.filter(a => a.experiment_id === selectedId);
    grid.innerHTML = renderFileCards(atts);
  }
}

async function removeAttachment(id) {
  if (!confirm('确定删除该附件吗？')) return;
  const att = data.attachments.find(a => a.id === id);
  if (att) {
    try { await deleteGitHubFile(att.path, '删除附件'); } catch(e) {}
    data.attachments = data.attachments.filter(a => a.id !== id);
  }
  await saveAllData('删除附件');
  refreshAttachments();
  showToast('附件已删除');
}

async function previewAtt(id) {
  const att = data.attachments.find(a => a.id === id);
  if (!att) return;
  const url = fileUrl(att.path);
  const type = att.type || '';
  const overlay = document.getElementById('previewModal');

  let bodyHTML = '';
  if (type.startsWith('image/')) {
    bodyHTML = `<img src="${url}" alt="${esc(att.name)}">`;
  } else if (type.startsWith('video/')) {
    bodyHTML = `<video src="${url}" controls autoplay></video>`;
  } else if (type.startsWith('audio/')) {
    bodyHTML = `<audio src="${url}" controls autoplay></audio>`;
  } else if (type === 'application/pdf') {
    bodyHTML = `<iframe src="${url}#toolbar=1&navpanes=1" style="width:85vw;height:85vh;"></iframe>`;
  } else if (type.startsWith('text/') || isCodeFile(att.name)) {
    try {
      const res = await fetch(url);
      const text = await res.text();
      bodyHTML = `<pre>${esc(text.slice(0, 500000))}</pre>`;
    } catch(e) {
      bodyHTML = `<div class="file-info"><p>无法加载文件内容</p></div>`;
    }
  } else {
    bodyHTML = `
      <div class="file-info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p style="font-size:16px;font-weight:500;">${esc(att.name)}</p>
        <p style="font-size:13px;">${(att.size/1024).toFixed(1)} KB — 该格式暂不支持在线预览</p>
        <a href="${url}" download="${esc(att.name)}" class="download-btn">⬇ 下载文件</a>
      </div>`;
  }

  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>${esc(att.name)}</h3>
        <button onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
    </div>`;
  overlay.style.display = 'flex';
}

async function downloadAtt(id) {
  const att = data.attachments.find(a => a.id === id);
  if (!att) return;
  window.open(fileUrl(att.path), '_blank');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('previewModal')) return;
  document.getElementById('previewModal').style.display = 'none';
}

function isCodeFile(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  return ['txt','md','json','csv','xml','html','css','js','ts','py','yaml','yml','log','cfg','ini','sh','bat'].includes(ext);
}

function filterByTag(tag) {
  currentFilter = tag;
  selectedId = null;
  renderDetail(null);
  renderSidebar(data.experiments.sort((a, b) => b.updated_at - a.updated_at));
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: '#1a1a1a', color: '#fff', padding: '10px 24px', borderRadius: '20px',
    fontSize: '14px', zIndex: '9999', pointerEvents: 'none',
    animation: 'slideUp .3s', boxShadow: '0 4px 20px rgba(0,0,0,.2)'
  });
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

/* ===== Setup ===== */
function saveSetup() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { showToast('请输入 Token'); return; }
  setToken(token);
  document.getElementById('setupOverlay').style.display = 'none';
  loadData();
}

function showSettings() {
  const token = getToken();
  const overlay = document.getElementById('setupOverlay');
  document.getElementById('tokenInput').value = token;
  overlay.style.display = 'flex';
}

// Search
document.getElementById('searchInput').addEventListener('input', () => {
  renderSidebar(data.experiments.sort((a, b) => b.updated_at - a.updated_at));
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (selectedId) saveCurrent(); }
  if (e.key === 'Escape') {
    const modal = document.getElementById('previewModal');
    if (modal.style.display === 'flex') modal.style.display = 'none';
    const setup = document.getElementById('setupOverlay');
    if (setup.style.display === 'flex' && getToken()) setup.style.display = 'none';
  }
});

// Init
if (getToken()) {
  document.getElementById('setupOverlay').style.display = 'none';
  loadData();
} else {
  document.getElementById('setupOverlay').style.display = 'flex';
}
</script>
