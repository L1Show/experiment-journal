<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验记录本</title>
<style>
/* ===== CSS Variables & Reset ===== */
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e8e8e4;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-muted: #9b9b9b;
  --accent: #2b6cb0;
  --accent-light: #ebf4ff;
  --accent-hover: #1a5490;
  --danger: #e53e3e;
  --danger-light: #fff5f5;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --sidebar-w: 320px;
  --topbar-h: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
  flex-shrink: 0;
}
.topbar .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .logo svg { width: 22px; height: 22px; color: var(--accent); }
.topbar .search-wrap {
  flex: 1;
  max-width: 360px;
  position: relative;
}
.topbar .search-wrap input {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 36px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  background: var(--bg);
  transition: all .2s;
}
.topbar .search-wrap input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.topbar .search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
}
.topbar .btn-new {
  height: 36px;
  padding: 0 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar .btn-new:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.topbar .btn-new svg { width: 16px; height: 16px; }

/* ===== Main Layout ===== */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header .count { font-size: 13px; color: var(--text-muted); }
.sidebar .tag-filter {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.sidebar .tag-filter::-webkit-scrollbar { height: 0; }
.tag-chip {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  user-select: none;
}
.tag-chip:hover { background: var(--accent-light); border-color: var(--accent); }
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.exp-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}
.exp-list::-webkit-scrollbar { width: 4px; }
.exp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
.exp-card {
  padding: 14px;
  margin-bottom: 6px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  border: 1px solid transparent;
  position: relative;
}
.exp-card:hover { background: #fafaf9; }
.exp-card.selected {
  background: var(--accent-light);
  border-color: var(--accent);
}
.exp-card .card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.exp-card .card-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.exp-card .card-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: #f0f0ed;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ===== Content Area ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.content-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}
.content-wrap::-webkit-scrollbar { width: 6px; }
.content-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 12px;
}
.empty-state svg { width: 64px; height: 64px; opacity: .3; }
.empty-state p { font-size: 15px; }

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: var(--bg);
  transition: all .15s;
  resize: vertical;
  line-height: 1.6;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-actions {
  display: flex;
  gap: 10px;
  padding-top: 8px;
}
.btn {
  height: 38px;
  padding: 0 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: #f5f5f3; }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: var(--danger); border-color: var(--danger); }
.btn.danger:hover { background: var(--danger-light); }
.btn svg { width: 16px; height: 16px; }

/* ===== Attachments ===== */
.attachments-section {
  margin-top: 24px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg);
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-zone svg { width: 32px; height: 32px; color: var(--text-muted); margin-bottom: 8px; }
.drop-zone p { font-size: 13px; color: var(--text-secondary); }
.drop-zone span { color: var(--accent); font-weight: 500; }
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 14px;
}
.file-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all .15s;
  cursor: pointer;
  position: relative;
}
.file-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
.file-card .file-icon-wrap {
  width: 100%;
  height: 80px;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #e8e8e4;
  flex-shrink: 0;
}
.file-card .file-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.file-card .file-icon-wrap .file-type-icon { font-size: 32px; opacity: .4; }
.file-card .file-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-card .file-size { font-size: 11px; color: var(--text-muted); }
.file-card .file-actions {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}
.file-card .file-actions button {
  flex: 1;
  height: 26px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  cursor: pointer;
  transition: all .1s;
}
.file-card .file-actions button:hover { background: var(--accent-light); }
.file-card .file-actions button.del-btn:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .15s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  max-width: 90vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 16px; }
.modal-header button {
  width: 32px; height: 32px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.modal-header button:hover { background: var(--bg); }
.modal-body {
  flex: 1;
  overflow: auto;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-body img { max-width: 100%; max-height: 70vh; border-radius: var(--radius-sm); }
.modal-body pre {
  width: 100%;
  max-height: 70vh;
  overflow: auto;
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
}
.modal-body video, .modal-body audio { max-width: 100%; max-height: 70vh; }
.modal-body iframe { width: 100%; height: 80vh; border: none; }
.modal-body .file-info {
  text-align: center;
  color: var(--text-secondary);
}
.modal-body .file-info svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 12px; }
.modal-body .file-info .download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { width: 100%; position: absolute; left: -100%; transition: left .3s; z-index: 10; height: 100%; }
  .sidebar.open { left: 0; }
  .content-wrap { padding: 16px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    实验记录本
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="搜索实验…">
  </div>
  <button class="btn-new" onclick="createNew()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    新建实验
  </button>

	  <button class="btn-new" onclick="exportToWord()" style="background:#48bb78">
	    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
	    导出Word
	  </button>
</header>

<!-- Main Layout -->
<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight:600;font-size:14px;">实验列表</span>
      <span class="count" id="expCount">0 条记录</span>
    </div>
    <div class="tag-filter" id="tagFilter"></div>
    <div class="exp-list" id="expList"></div>
  </aside>

  <!-- Content -->
  <main class="content" id="content">
    <div class="content-wrap" id="contentWrap">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        <p>选择左侧实验或点击「新建实验」开始记录</p>
      </div>
      <div id="detailPanel" style="display:none;"></div>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal-overlay" style="display:none;" onclick="closeModal(event)"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Supabase Sync v4 */
var SUPABASE_URL="https://dacwwmcfrkeeonjxyelr.supabase.co";
var SUPABASE_KEY="sb_publishable_urA7ERfwuRaJN3QoITnf7Q_fj0RFTAq";
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var experiments=[],selectedId=null,currentFilter="全部",_loading=false;

async function reload(){
  if(_loading)return;_loading=true;
  try{var r=await sb.from("experiments").select("*").order("updated_at",{ascending:false});if(!r.error)experiments=r.data}catch(e){}
  _loading=false;renderAll();
}

function fileUrl(path){return SUPABASE_URL+'/storage/v1/object/public/attachments/'+path}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function escAttr(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fi(t){if(!t)return"📄";if(t.indexOf("pdf")>=0)return"📑";if(t.indexOf("text")>=0||t.indexOf("json")>=0||t.indexOf("xml")>=0)return"📝";if(t.indexOf("video")>=0)return"🎬";if(t.indexOf("audio")>=0)return"🎵";return"📄"}
function isCode(n){var x=["txt","md","json","csv","xml","html","css","js","ts","py","yaml","yml","log","cfg","ini","sh","bat"];return x.indexOf((n||"").split(".").pop().toLowerCase())>=0}

function showToast(msg){
  var t=document.createElement("div");t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#fff",padding:"10px 24px",borderRadius:"20px",fontSize:"14px",zIndex:"9999",pointerEvents:"none",animation:"slideUp .3s",boxShadow:"0 4px 20px rgba(0,0,0,.2)"});
  document.body.appendChild(t);setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(function(){t.remove()},300)},2000);
}

function renderAll(){
  renderSidebar();
  if(selectedId){var e=experiments.find(function(x){return x.id===selectedId});if(e)renderDetail(e);else{selectedId=null;renderDetail(null)}}
}

function renderSidebar(){
  var l=document.getElementById("expList"),c=document.getElementById("expCount"),f=document.getElementById("tagFilter");
  var tags={};experiments.forEach(function(e){if(e.category)tags[e.category]=true});
  var s=(document.getElementById("searchInput").value||"").toLowerCase(),fl=experiments;
  if(currentFilter!=="全部")fl=fl.filter(function(e){return e.category===currentFilter});
  if(s)fl=fl.filter(function(e){return(e.title||"").toLowerCase().indexOf(s)>=0||(e.category||"").toLowerCase().indexOf(s)>=0||(e.objective||"").toLowerCase().indexOf(s)>=0});
  var tArr=["全部"];for(var k in tags)tArr.push(k);
  f.innerHTML=tArr.map(function(t){return'<span class="tag-chip'+(t===currentFilter?' active':'')+'" onclick="filterByTag(\''+t.replace(/'/g,"\\\\'")+'\')\">'+t+'</span>'}).join("");
  c.textContent=experiments.length+" 条记录";
  if(!fl.length){l.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">暂无实验记录</div>';return}
  l.innerHTML=fl.map(function(e){var d=e.date?new Date(e.date+"T00:00:00"):new Date(e.created_at),ds=isNaN(d.getTime())?"":d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");return'<div class="exp-card'+(e.id===selectedId?' selected':'')+'" onclick="selectExp('+e.id+')"><div class="card-title">'+esc(e.title||"未命名实验")+'</div><div class="card-meta"><span>'+ds+'</span></div>'+(e.category?'<span class="card-tag">'+esc(e.category)+'</span>':'')+'</div>'}).join("");
}

async function selectExp(id){
  selectedId=id;var e=experiments.find(function(x){return x.id===id});
  if(!e){renderDetail(null);return}
  var atts=[];try{var r=await sb.from("attachments").select("*").eq("experiment_id",id).order("uploaded_at",{ascending:false});if(!r.error)atts=r.data}catch(err){}
  renderDetail(e,atts);renderSidebar();
}

function renderDetail(exp,atts){
  var em=document.getElementById("emptyState"),pn=document.getElementById("detailPanel");
  if(!exp){em.style.display="flex";pn.style.display="none";return}
  em.style.display="none";pn.style.display="block";atts=atts||[];
  var d=exp.date?new Date(exp.date+"T00:00:00"):new Date(exp.created_at),dv=isNaN(d.getTime())?"":d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  pn.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h2 style="font-size:22px;font-weight:700">实验详情</h2><div class="form-actions" style="padding:0"><button class="btn primary" onclick="saveCurrent()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存</button><button class="btn danger" onclick="deleteCurrent()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>删除</button></div></div><div class="form-row"><div class="form-group"><label>实验标题</label><input type="text" id="fTitle" value="'+escAttr(exp.title||'')+'" placeholder="例如：溶胶-凝胶法合成TiO₂纳米颗粒"></div><div class="form-group"><label>实验日期</label><input type="date" id="fDate" value="'+dv+'"></div></div><div class="form-group"><label>实验分类</label><input type="text" id="fCategory" value="'+escAttr(exp.category||'')+'" placeholder="例如：合成、XRD表征、EIS测试、SEM…"></div><div class="form-group"><label>实验目的</label><textarea id="fObjective" rows="2" placeholder="描述本次实验的目标…">'+esc(exp.objective||'')+'</textarea></div><div class="form-group"><label>实验流程与条件</label><textarea id="fProcess" rows="6" placeholder="记录实验步骤、反应条件（温度、时间、配比等）…">'+esc(exp.process||'')+'</textarea></div><div class="form-group"><label>实验结果与数据</label><textarea id="fResults" rows="5" placeholder="记录实验结果、XRD图谱分析、EIS数据、SEM观察等…">'+esc(exp.results||'')+'</textarea></div><div class="form-group"><label>结论与备注</label><textarea id="fConclusion" rows="3" placeholder="实验结论、改进方向、注意事项…">'+esc(exp.conclusion||'')+'</textarea></div><div class="attachments-section"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">📎 附件文件</h3><div class="drop-zone" id="dropZone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p>拖拽文件到此处，或 <span>点击上传</span></p><input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)"></div><div class="file-grid" id="fileGrid">'+renderFileCards(atts)+'</div></div>';
  setTimeout(function(){
    var dz=document.getElementById("dropZone"),fi=document.getElementById("fileInput");
    if(dz){dz.onclick=function(){fi.click()};dz.ondragover=function(e){e.preventDefault();dz.classList.add("dragover")};dz.ondragleave=function(){dz.classList.remove("dragover")};dz.ondrop=function(e){e.preventDefault();dz.classList.remove("dragover");handleFiles(e.dataTransfer.files)}}
  },100);
}

function renderFileCards(atts){
  if(!atts||!atts.length)return'<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-muted);font-size:13px">暂无附件</div>';
  return atts.map(function(a){var isImg=a.type&&a.type.indexOf("image/")===0,sz=a.size>1048576?(a.size/1048576).toFixed(1)+" MB":(a.size/1024).toFixed(0)+" KB",u=a.storage_path?fileUrl(a.storage_path):"#";return'<div class="file-card" onclick="previewAtt('+a.id+')"><div class="file-icon-wrap">'+(isImg?'<img src="'+u+'" alt="'+esc(a.name)+'" loading="lazy">':'<span class="file-type-icon">'+fi(a.type)+'</span>')+'</div><div class="file-name" title="'+esc(a.name)+'">'+esc(a.name)+'</div><div class="file-size">'+sz+'</div><div class="file-actions" onclick="event.stopPropagation()"><button onclick="previewAtt('+a.id+')">预览</button><button onclick="downloadAtt('+a.id+')">下载</button><button class="del-btn" onclick="removeAttachment('+a.id+')">删除</button></div></div>'}).join("");
}

/* Operations - save then reload */
async function createNew(){
  var exp={title:"",date:new Date().toISOString().split("T")[0],category:"",objective:"",process:"",results:"",conclusion:"",created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  experiments.unshift(exp);selectedId=exp.id;renderAll();
  try{var saved=await sb.from("experiments").insert(exp).select().single();if(!saved.error&&saved.data){exp.id=saved.data.id;selectedId=saved.data.id}}
  catch(e){}
  await reload();
}

async function saveCurrent(){
  if(!selectedId)return;var exp=experiments.find(function(e){return e.id===selectedId});if(!exp)return;
  exp.title=document.getElementById("fTitle").value.trim();exp.date=document.getElementById("fDate").value;exp.category=document.getElementById("fCategory").value.trim();exp.objective=document.getElementById("fObjective").value.trim();exp.process=document.getElementById("fProcess").value.trim();exp.results=document.getElementById("fResults").value.trim();exp.conclusion=document.getElementById("fConclusion").value.trim();exp.updated_at=new Date().toISOString();
  try{await sb.from("experiments").upsert(exp)}catch(e){}
  showToast("✅ 已保存");
  await reload();
}

async function deleteCurrent(){
  if(!selectedId)return;if(!confirm("确定删除？"))return;
  try{await sb.from("experiments").delete().eq("id",selectedId)}catch(e){}
  selectedId=null;renderDetail(null);showToast("✅ 已删除");
  await reload();
}

async function handleFiles(files){
  if(!selectedId){showToast("请先选择实验");return}if(!files.length)return;
  var ok=0,errs=[];
  for(var i=0;i<files.length;i++){var f=files[i];try{var path=selectedId+"/"+Date.now()+"_"+f.name;var ur=await sb.storage.from("attachments").upload(path,f,{cacheControl:"3600",upsert:false});if(ur.error){errs.push(f.name+": "+ur.error.message)}else{var ir=await sb.from("attachments").insert({experiment_id:selectedId,name:f.name,type:f.type,size:f.size,storage_path:path});if(ir.error)errs.push(f.name+": insert failed");else ok++}}catch(e){errs.push(f.name+": "+e.message)}}
  if(ok)showToast("✅ 已上传 "+ok+" 个");if(errs.length)showToast("❌ "+errs.join(", "));
  var atts=[];try{var r=await sb.from("attachments").select("*").eq("experiment_id",selectedId).order("uploaded_at",{ascending:false});if(!r.error)atts=r.data}catch(e){}
  var g=document.getElementById("fileGrid");if(g)g.innerHTML=renderFileCards(atts);
}

async function removeAttachment(id){if(!confirm("确定删除？"))return;try{var ar=await sb.from("attachments").select("*").eq("id",id).single();if(ar.data){await sb.storage.from("attachments").remove([ar.data.storage_path]);await sb.from("attachments").delete().eq("id",id)}}catch(e){};var atts=[];try{var r=await sb.from("attachments").select("*").eq("experiment_id",selectedId).order("uploaded_at",{ascending:false});if(!r.error)atts=r.data}catch(e){};var g=document.getElementById("fileGrid");if(g)g.innerHTML=renderFileCards(atts);showToast("已删除")}

async function previewAtt(id){
  var ar=await sb.from("attachments").select("*").eq("id",id).single();if(ar.error||!ar.data)return;var a=ar.data,u=fileUrl(a.storage_path),t=a.type||"",ov=document.getElementById("previewModal"),b="";
  if(t.indexOf("image/")===0)b='<img src="'+u+'" alt="'+esc(a.name)+'">';else if(t.indexOf("video/")===0)b='<video src="'+u+'" controls autoplay></video>';else if(t.indexOf("audio/")===0)b='<audio src="'+u+'" controls autoplay></audio>';else if(t==="application/pdf")b='<iframe src="'+u+'" style="width:85vw;height:85vh"></iframe>';else if(t.indexOf("text/")===0||isCode(a.name)){try{var rx=await fetch(u);b='<pre>'+esc((await rx.text()).slice(0,500000))+'</pre>'}catch(ex){b='<div class="file-info"><p>无法加载</p></div>'}}else b='<div class="file-info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p style="font-size:16px;font-weight:500">'+esc(a.name)+'</p><p style="font-size:13px">'+((a.size||0)/1024).toFixed(1)+' KB</p><a href="'+u+'" download class="download-btn">⬇ 下载</a></div>';
  ov.innerHTML='<div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h3>'+esc(a.name)+'</h3><button onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div class="modal-body">'+b+'</div></div>';ov.style.display="flex";
}

function downloadAtt(id){sb.from("attachments").select("*").eq("id",id).single().then(function(r){if(r.data)window.open(fileUrl(r.data.storage_path),"_blank")})}
function closeModal(e){if(e&&e.target!==document.getElementById("previewModal"))return;document.getElementById("previewModal").style.display="none"}
function filterByTag(t){currentFilter=t;selectedId=null;renderDetail(null);renderSidebar()}
document.getElementById("searchInput").addEventListener("input",function(){renderSidebar()});
document.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();if(selectedId)saveCurrent()}if(e.key==="Escape"){document.getElementById("previewModal").style.display="none"}});


/* ===== Export ===== */
async function exportToWord(){
  showToast("正在生成文档…");
  try{
    var r=await sb.from("experiments").select("*").order("updated_at",{ascending:false});
    if(r.error)throw r.error;
    var exps=r.data;
    if(!exps.length){showToast("暂无实验数据可导出");return}

    var ar=await sb.from("attachments").select("*");
    var allAtts=ar.error?[]:ar.data;

    var h='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]--><style>@page{size:A4;margin:2cm}body{font-family:"Microsoft YaHei","SimSun",sans-serif;font-size:14px;line-height:1.8;color:#333}h1{text-align:center;font-size:24px;border-bottom:2px solid #2b6cb0;padding-bottom:12px;margin-bottom:8px}h2{font-size:16px;color:#2b6cb0;margin:24px 0 8px 0;padding:6px 0;border-bottom:1px solid #ddd}.meta{color:#888;font-size:12px;margin-bottom:12px}.section{margin:10px 0 10px 20px}.section .lbl{font-weight:bold;color:#2b6cb0}.divider{text-align:center;color:#ccc;border:none;border-top:1px dashed #ddd;margin:30px 0;page-break-before:always}.img-box{margin:12px 0;text-align:center}.img-box img{max-width:180px;height:auto;border:1px solid #eee;padding:4px}.img-box .cap{font-size:11px;color:#888;margin-top:4px}.attach{font-size:13px;color:#666;margin:2px 0 2px 20px}</style></head><body>';
    h+='<h1>实验记录</h1><p style="text-align:center;color:#888;font-size:12px;margin-bottom:30px">导出日期: '+new Date().toISOString().split("T")[0]+'</p>';

    for(var i=0;i<exps.length;i++){
      var e=exps[i],d=e.date||"";
      if(typeof d==="string"&&d.indexOf("T")>=0)d=d.split("T")[0];
      if(i>0)h+='<hr class="divider">';
      h+='<h2>'+(i+1)+'. '+esc(e.title||"未命名实验")+'</h2>';
      h+='<p class="meta">📅 '+d+' &nbsp;|&nbsp; 🏷 '+esc(e.category||"无")+'</p>';
      if(e.objective)h+=fld("实验目的",e.objective);
      if(e.process)h+=fld("实验流程与条件",e.process);
      if(e.results)h+=fld("实验结果与数据",e.results);
      if(e.conclusion)h+=fld("结论与备注",e.conclusion);

      var atts=allAtts.filter(function(a){return a.experiment_id===e.id});
      for(var j=0;j<atts.length;j++){
        var att=atts[j],url=fileUrl(att.storage_path);
        if(att.type&&att.type.indexOf("image/")===0){
          try{var imgResp=await fetch(url);var blob=await imgResp.blob();var b64=await blobToBase64(blob);h+='<div class="img-box"><img src="'+b64+'"><div class="cap">'+esc(att.name)+'</div></div>'}catch(ex){h+='<p class="attach">📷 '+esc(att.name)+' (加载失败)</p>'}
        }else{h+='<p class="attach">📎 '+esc(att.name)+' ('+(att.size/1024).toFixed(0)+' KB)</p>'}
      }
    }
    h+='</body></html>';

    var blob=new Blob(["﻿"+h],{type:"application/msword;charset=utf-8"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="实验记录.doc";a.click();
    showToast("✅ 已导出");
  }catch(e){console.error(e);showToast("❌ 导出失败: "+e.message)}
}

function blobToBase64(blob){return new Promise(function(resolve){var r=new FileReader();r.onload=function(){resolve(r.result)};r.readAsDataURL(blob)})}

function fld(lbl,txt){return'<div class="section"><span class="lbl">'+esc(lbl)+'：</span>'+esc(txt)+'</div>'}

/* Init */
if(!window.supabase){document.getElementById("expList").innerHTML='<div style="text-align:center;padding:40px;color:var(--danger)">⚠️ 加载失败<br><small>CDN 未加载，请刷新</small></div>'}else{reload()}

</script>
