<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验记录本</title>
<style>
/* ===== CSS Variables & Reset ===== */
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e8e8e4;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-muted: #9b9b9b;
  --accent: #2b6cb0;
  --accent-light: #ebf4ff;
  --accent-hover: #1a5490;
  --danger: #e53e3e;
  --danger-light: #fff5f5;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --sidebar-w: 320px;
  --topbar-h: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
  flex-shrink: 0;
}
.topbar .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .logo svg { width: 22px; height: 22px; color: var(--accent); }
.topbar .search-wrap {
  flex: 1;
  max-width: 360px;
  position: relative;
}
.topbar .search-wrap input {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 36px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  background: var(--bg);
  transition: all .2s;
}
.topbar .search-wrap input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.topbar .search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
}
.topbar .btn-new {
  height: 36px;
  padding: 0 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar .btn-new:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.topbar .btn-new svg { width: 16px; height: 16px; }

/* ===== Main Layout ===== */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header .count { font-size: 13px; color: var(--text-muted); }
.sidebar .tag-filter {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.sidebar .tag-filter::-webkit-scrollbar { height: 0; }
.tag-chip {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  user-select: none;
}
.tag-chip:hover { background: var(--accent-light); border-color: var(--accent); }
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.exp-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}
.exp-list::-webkit-scrollbar { width: 4px; }
.exp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
.exp-card {
  padding: 14px;
  margin-bottom: 6px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  border: 1px solid transparent;
  position: relative;
}
.exp-card:hover { background: #fafaf9; }
.exp-card.selected {
  background: var(--accent-light);
  border-color: var(--accent);
}
.exp-card .card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.exp-card .card-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.exp-card .card-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: #f0f0ed;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ===== Content Area ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.content-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}
.content-wrap::-webkit-scrollbar { width: 6px; }
.content-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 12px;
}
.empty-state svg { width: 64px; height: 64px; opacity: .3; }
.empty-state p { font-size: 15px; }

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: var(--bg);
  transition: all .15s;
  resize: vertical;
  line-height: 1.6;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-actions {
  display: flex;
  gap: 10px;
  padding-top: 8px;
}
.btn {
  height: 38px;
  padding: 0 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: #f5f5f3; }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: var(--danger); border-color: var(--danger); }
.btn.danger:hover { background: var(--danger-light); }
.btn svg { width: 16px; height: 16px; }

/* ===== Attachments ===== */
.attachments-section {
  margin-top: 24px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg);
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-zone svg { width: 32px; height: 32px; color: var(--text-muted); margin-bottom: 8px; }
.drop-zone p { font-size: 13px; color: var(--text-secondary); }
.drop-zone span { color: var(--accent); font-weight: 500; }
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 14px;
}
.file-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all .15s;
  cursor: pointer;
  position: relative;
}
.file-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
.file-card .file-icon-wrap {
  width: 100%;
  height: 80px;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #e8e8e4;
  flex-shrink: 0;
}
.file-card .file-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.file-card .file-icon-wrap .file-type-icon { font-size: 32px; opacity: .4; }
.file-card .file-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-card .file-size { font-size: 11px; color: var(--text-muted); }
.file-card .file-actions {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}
.file-card .file-actions button {
  flex: 1;
  height: 26px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  cursor: pointer;
  transition: all .1s;
}
.file-card .file-actions button:hover { background: var(--accent-light); }
.file-card .file-actions button.del-btn:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .15s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  max-width: 90vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 16px; }
.modal-header button {
  width: 32px; height: 32px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.modal-header button:hover { background: var(--bg); }
.modal-body {
  flex: 1;
  overflow: auto;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-body img { max-width: 100%; max-height: 70vh; border-radius: var(--radius-sm); }
.modal-body pre {
  width: 100%;
  max-height: 70vh;
  overflow: auto;
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
}
.modal-body video, .modal-body audio { max-width: 100%; max-height: 70vh; }
.modal-body iframe { width: 100%; height: 80vh; border: none; }
.modal-body .file-info {
  text-align: center;
  color: var(--text-secondary);
}
.modal-body .file-info svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 12px; }
.modal-body .file-info .download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { width: 100%; position: absolute; left: -100%; transition: left .3s; z-index: 10; height: 100%; }
  .sidebar.open { left: 0; }
  .content-wrap { padding: 16px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    实验记录本
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="搜索实验…">
  </div>
  <button class="btn-new" onclick="createNew()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    新建实验
  </button>
</header>

<!-- Main Layout -->
<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight:600;font-size:14px;">实验列表</span>
      <span class="count" id="expCount">0 条记录</span>
    </div>
    <div class="tag-filter" id="tagFilter"></div>
    <div class="exp-list" id="expList"></div>
  </aside>

  <!-- Content -->
  <main class="content" id="content">
    <div class="content-wrap" id="contentWrap">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        <p>选择左侧实验或点击「新建实验」开始记录</p>
      </div>
      <div id="detailPanel" style="display:none;"></div>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal-overlay" style="display:none;" onclick="closeModal(event)"></div>

<script>
/* ===== IndexedDB Layer ===== */
const DB_NAME = 'ExpJournal', DB_VER = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('experiments')) {
        const exp = d.createObjectStore('experiments', { keyPath: 'id', autoIncrement: true });
        exp.createIndex('updatedAt', 'updatedAt');
      }
      if (!d.objectStoreNames.contains('attachments')) {
        const att = d.createObjectStore('attachments', { keyPath: 'id', autoIncrement: true });
        att.createIndex('experimentId', 'experimentId');
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function tx(store, mode = 'readonly') {
  return db.transaction(store, mode).objectStore(store);
}

function promisify(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

// Wait for BOTH the request and the transaction to complete
// This fixes the classic IndexedDB bug where data isn't visible after "save"
function txDone(store) {
  return new Promise((resolve, reject) => {
    const t = store.transaction;
    t.oncomplete = resolve;
    t.onerror = () => reject(t.error);
    t.onabort = () => reject(t.error || new Error('Transaction aborted'));
  });
}
async function txCommit(store, op) {
  const result = await promisify(op(store));
  await txDone(store);
  return result;
}

/* ===== Experiment CRUD ===== */
async function getAllExperiments() {
  return promisify(tx('experiments').getAll());
}

async function getExperiment(id) {
  return promisify(tx('experiments').get(id));
}

async function saveExperiment(exp) {
  const now = Date.now();
  if (!exp.createdAt) exp.createdAt = now;
  exp.updatedAt = now;
  return txCommit(tx('experiments', 'readwrite'), s => s.put(exp));
}

async function deleteExperiment(id) {
  const atts = await getAttachments(id);
  if (atts.length) {
    const s = tx('attachments', 'readwrite');
    for (const a of atts) s.delete(a.id);
    await txDone(s);
  }
  await txCommit(tx('experiments', 'readwrite'), s => s.delete(id));
  // Verify deletion succeeded
  const check = await promisify(tx('experiments').get(id));
  if (check) throw new Error('记录删除验证失败');
}

/* ===== Attachment CRUD ===== */
async function getAttachments(experimentId) {
  const index = tx('attachments').index('experimentId');
  return promisify(index.getAll(experimentId));
}

// Blob URL memory management
const _blobUrls = new Set();
function createBlobUrl(blob) {
  const url = URL.createObjectURL(blob);
  _blobUrls.add(url);
  return url;
}
function revokeAllBlobUrls() {
  _blobUrls.forEach(url => URL.revokeObjectURL(url));
  _blobUrls.clear();
}

async function saveAttachment(att) {
  att.uploadedAt = Date.now();
  return txCommit(tx('attachments', 'readwrite'), s => s.put(att));
}

async function deleteAttachment(id) {
  return txCommit(tx('attachments', 'readwrite'), s => s.delete(id));
}

async function getAttachment(id) {
  return promisify(tx('attachments').get(id));
}

/* ===== State ===== */
let experiments = [];
let selectedId = null;
let currentFilter = '全部';
let _renderingId = 0;  // Guard against race conditions

/* ===== Render ===== */
async function refresh() {
  experiments = await getAllExperiments();
  experiments.sort((a, b) => b.updatedAt - a.updatedAt);
  renderSidebar();
  if (selectedId) {
    const exp = experiments.find(e => e.id === selectedId);
    if (exp) renderDetail(exp);
    else { selectedId = null; renderDetail(null); }
  }
}

function renderSidebar() {
  const list = document.getElementById('expList');
  const countEl = document.getElementById('expCount');
  const tagFilter = document.getElementById('tagFilter');

  // Collect tags
  const tags = new Set();
  experiments.forEach(e => { if (e.category) tags.add(e.category); });

  // Filter
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = experiments;
  if (currentFilter !== '全部') {
    filtered = filtered.filter(e => e.category === currentFilter);
  }
  if (search) {
    filtered = filtered.filter(e =>
      (e.title || '').toLowerCase().includes(search) ||
      (e.category || '').toLowerCase().includes(search) ||
      (e.objective || '').toLowerCase().includes(search)
    );
  }

  // Tag chips
  const tagArr = ['全部', ...tags];
  tagFilter.innerHTML = tagArr.map(t =>
    `<span class="tag-chip${t === currentFilter ? ' active' : ''}" onclick="filterByTag('${t.replace(/'/g, "\\'")}')">${t}</span>`
  ).join('');

  countEl.textContent = `${experiments.length} 条记录`;

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">暂无实验记录</div>';
    return;
  }

  list.innerHTML = filtered.map(e => {
    const d = new Date(e.date || e.createdAt);
    const dateStr = isNaN(d) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return `
      <div class="exp-card${e.id === selectedId ? ' selected' : ''}" onclick="selectExp(${e.id})">
        <div class="card-title">${esc(e.title || '未命名实验')}</div>
        <div class="card-meta">
          <span>${dateStr}</span>
        </div>
        ${e.category ? `<span class="card-tag">${esc(e.category)}</span>` : ''}
      </div>`;
  }).join('');
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function selectExp(id) {
  selectedId = id;
  const exp = experiments.find(e => e.id === id);
  const rid = ++_renderingId;
  if (exp) {
    await renderDetail(exp, rid);
    // Only update sidebar if this is still the latest render
    if (rid === _renderingId) renderSidebar();
  } else {
    renderDetail(null);
  }
}

async function renderDetail(exp, rid) {
  const empty = document.getElementById('emptyState');
  const panel = document.getElementById('detailPanel');

  if (!exp) {
    empty.style.display = 'flex';
    panel.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  panel.style.display = 'block';

  revokeAllBlobUrls();
  const attachments = await getAttachments(exp.id);
  if (rid && rid !== _renderingId) return; // Abort stale render
  const d = exp.date ? new Date(exp.date) : new Date(exp.createdAt);
  const dateVal = isNaN(d) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2 style="font-size:22px;font-weight:700;">实验详情</h2>
      <div class="form-actions" style="padding:0;">
        <button class="btn primary" onclick="saveCurrent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存
        </button>
        <button class="btn danger" onclick="deleteCurrent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>实验标题</label>
        <input type="text" id="fTitle" value="${escAttr(exp.title || '')}" placeholder="例如：溶胶-凝胶法合成TiO₂纳米颗粒">
      </div>
      <div class="form-group">
        <label>实验日期</label>
        <input type="date" id="fDate" value="${dateVal}">
      </div>
    </div>

    <div class="form-group">
      <label>实验分类</label>
      <input type="text" id="fCategory" value="${escAttr(exp.category || '')}" placeholder="例如：合成、XRD表征、EIS测试、SEM…">
    </div>

    <div class="form-group">
      <label>实验目的</label>
      <textarea id="fObjective" rows="2" placeholder="描述本次实验的目标…">${esc(exp.objective || '')}</textarea>
    </div>

    <div class="form-group">
      <label>实验流程与条件</label>
      <textarea id="fProcess" rows="6" placeholder="记录实验步骤、反应条件（温度、时间、配比等）…">${esc(exp.process || '')}</textarea>
    </div>

    <div class="form-group">
      <label>实验结果与数据</label>
      <textarea id="fResults" rows="5" placeholder="记录实验结果、XRD图谱分析、EIS数据、SEM观察等…">${esc(exp.results || '')}</textarea>
    </div>

    <div class="form-group">
      <label>结论与备注</label>
      <textarea id="fConclusion" rows="3" placeholder="实验结论、改进方向、注意事项…">${esc(exp.conclusion || '')}</textarea>
    </div>

    <!-- Attachments -->
    <div class="attachments-section">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;">📎 附件文件</h3>
      <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>拖拽文件到此处，或 <span>点击上传</span></p>
        <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFiles(this.files)">
      </div>
      <div class="file-grid" id="fileGrid">
        ${renderFileCards(attachments)}
      </div>
    </div>
  `;

  // File upload bindings
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
}

function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderFileCards(attachments) {
  if (!attachments.length) return '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">暂无附件，拖拽文件到上方区域上传</div>';
  return attachments.map(a => {
    const isImage = a.type && a.type.startsWith('image/');
    const sizeStr = a.size > 1024*1024 ? `${(a.size/(1024*1024)).toFixed(1)} MB` : `${(a.size/1024).toFixed(0)} KB`;
    return `
      <div class="file-card" onclick="previewFile(${a.id})">
        <div class="file-icon-wrap">
          ${isImage
            ? `<img src="${createBlobUrl(a.data)}" alt="${esc(a.name)}" loading="lazy">`
            : `<span class="file-type-icon">${fileIcon(a.type)}</span>`
          }
        </div>
        <div class="file-name" title="${esc(a.name)}">${esc(a.name)}</div>
        <div class="file-size">${sizeStr}</div>
        <div class="file-actions" onclick="event.stopPropagation()">
          <button onclick="previewFile(${a.id})">预览</button>
          <button onclick="downloadFile(${a.id})">下载</button>
          <button class="del-btn" onclick="removeAttachment(${a.id})">删除</button>
        </div>
      </div>`;
  }).join('');
}

function fileIcon(type) {
  if (!type) return '📄';
  if (type.includes('pdf')) return '📑';
  if (type.includes('text') || type.includes('json') || type.includes('xml')) return '📝';
  if (type.includes('video')) return '🎬';
  if (type.includes('audio')) return '🎵';
  if (type.includes('zip') || type.includes('rar') || type.includes('tar')) return '📦';
  return '📄';
}

/* ===== Actions ===== */
async function createNew() {
  const exp = {
    title: '',
    date: new Date().toISOString().split('T')[0],
    category: '',
    objective: '',
    process: '',
    results: '',
    conclusion: '',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  const id = await saveExperiment(exp);
  selectedId = id;
  await refresh();
}

async function saveCurrent() {
  if (!selectedId) return;
  const title = document.getElementById('fTitle').value.trim();
  const date = document.getElementById('fDate').value;
  const category = document.getElementById('fCategory').value.trim();
  const objective = document.getElementById('fObjective').value.trim();
  const process = document.getElementById('fProcess').value.trim();
  const results = document.getElementById('fResults').value.trim();
  const conclusion = document.getElementById('fConclusion').value.trim();

  const exp = await getExperiment(selectedId);
  exp.title = title;
  exp.date = date;
  exp.category = category;
  exp.objective = objective;
  exp.process = process;
  exp.results = results;
  exp.conclusion = conclusion;

  await saveExperiment(exp);
  await refresh();
  showToast('✅ 保存成功');
}

async function deleteCurrent() {
  if (!selectedId) return;
  if (!confirm('确定要删除该实验及其所有附件吗？此操作不可撤销。')) return;
  try {
    await deleteExperiment(selectedId);
    selectedId = null;
    await refresh();
    renderDetail(null);
    showToast('✅ 已删除');
  } catch (err) {
    console.error('Delete error:', err);
    showToast('❌ 删除失败，请刷新页面后重试');
  }
}

async function handleFiles(files) {
  if (!selectedId) { showToast('请先选择或创建一个实验'); return; }
  if (!files.length) return;

  for (const file of files) {
    const reader = new FileReader();
    await new Promise(resolve => {
      reader.onload = async () => {
        await saveAttachment({
          experimentId: selectedId,
          name: file.name,
          type: file.type,
          size: file.size,
          data: new Blob([reader.result], { type: file.type })
        });
        resolve();
      };
      reader.readAsArrayBuffer(file);
    });
  }
  await refreshAttachments();
  showToast(`✅ 已上传 ${files.length} 个文件`);
}

async function refreshAttachments() {
  if (!selectedId) return;
  const attachments = await getAttachments(selectedId);
  const grid = document.getElementById('fileGrid');
  if (grid) {
    revokeAllBlobUrls();
    grid.innerHTML = renderFileCards(attachments);
  }
}

async function removeAttachment(id) {
  if (!confirm('确定删除该附件吗？')) return;
  await deleteAttachment(id);
  await refreshAttachments();
  showToast('附件已删除');
}

async function previewFile(id) {
  const att = await getAttachment(id);
  if (!att) return;
  const blob = att.data;
  const url = createBlobUrl(blob);
  const type = att.type || '';

  const overlay = document.getElementById('previewModal');
  const title = att.name;

  let bodyHTML = '';
  if (type.startsWith('image/')) {
    bodyHTML = `<img src="${url}" alt="${esc(title)}">`;
  } else if (type.startsWith('video/')) {
    bodyHTML = `<video src="${url}" controls autoplay></video>`;
  } else if (type.startsWith('audio/')) {
    bodyHTML = `<audio src="${url}" controls autoplay></audio>`;
  } else if (type === 'application/pdf') {
    bodyHTML = `<iframe src="${url}#toolbar=1&navpanes=1" style="width:85vw;height:85vh;"></iframe>`;
  } else if (type.startsWith('text/') || isCodeFile(att.name)) {
    const text = await blob.text();
    bodyHTML = `<pre>${esc(text.slice(0, 500000))}</pre>`;
  } else {
    bodyHTML = `
      <div class="file-info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p style="font-size:16px;font-weight:500;">${esc(title)}</p>
        <p style="font-size:13px;">${(att.size/1024).toFixed(1)} KB — 该格式暂不支持在线预览</p>
        <a href="${url}" download="${esc(title)}" class="download-btn">⬇ 下载文件</a>
      </div>`;
  }

  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>${esc(title)}</h3>
        <button onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
    </div>`;
  overlay.style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('previewModal')) return;
  document.getElementById('previewModal').style.display = 'none';
}

function isCodeFile(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  return ['txt','md','json','csv','xml','html','css','js','ts','py','yaml','yml','log','cfg','ini','sh','bat'].includes(ext);
}

async function downloadFile(id) {
  const att = await getAttachment(id);
  if (!att) return;
  const url = createBlobUrl(att.data);
  const a = document.createElement('a');
  a.href = url;
  a.download = att.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function filterByTag(tag) {
  currentFilter = tag;
  selectedId = null;
  renderDetail(null);
  renderSidebar();
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: '#1a1a1a', color: '#fff', padding: '10px 24px', borderRadius: '20px',
    fontSize: '14px', zIndex: '9999', pointerEvents: 'none',
    animation: 'slideUp .3s', boxShadow: '0 4px 20px rgba(0,0,0,.2)'
  });
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// Search binding
document.getElementById('searchInput').addEventListener('input', () => {
  renderSidebar();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (selectedId) saveCurrent();
  }
  if (e.key === 'Escape') {
    const modal = document.getElementById('previewModal');
    if (modal.style.display === 'flex') {
      modal.style.display = 'none';
    }
  }
});

// Init
openDB().then(() => {
  refresh();
}).catch(err => {
  console.error('数据库初始化失败:', err);
  document.getElementById('expList').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--danger);">⚠️ 数据库初始化失败，请检查浏览器是否支持 IndexedDB（无痕模式可能禁用）</div>';
});
</script>
</body>
